<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcar horário — The Classic House Barbearia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#F6EEDF; --bg-alt:#EFE3CC; --bg-card:#E7D9BC;
    --ink:#2A1F15; --ink-muted:#7A6A50;
    --brass:#A9782E; --brass-dim:rgba(169,120,46,0.35);
    --primary:#2A1F15; --primary-hover:#43331F;
    --ok:#3F7A52; --err:#A8402F;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif; line-height:1.5;
  }
  .wrap{ max-width:640px; margin:0 auto; padding:28px 20px 100px; }
  h1{ font-family:'Fraunces', serif; font-size:1.7rem; margin:0 0 4px; }
  a.back{ color:var(--ink-muted); text-decoration:none; font-size:0.85rem; }
  .eyebrow{ font-family:'IBM Plex Mono',monospace; text-transform:uppercase; letter-spacing:0.14em; font-size:0.68rem; color:var(--brass); }

  .steps{ display:flex; gap:6px; margin:22px 0 30px; }
  .step-dot{ flex:1; height:3px; background:var(--brass-dim); border-radius:2px; }
  .step-dot.done{ background:var(--brass); }

  .card{
    border:1px solid var(--brass-dim); background:var(--bg-alt);
    padding:16px 18px; margin-bottom:12px; cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .card:hover{ border-color:var(--brass); }
  .card.selected{ border-color:var(--brass); background:var(--bg-card); }
  .card-row{ display:flex; justify-content:space-between; align-items:baseline; gap:12px; }
  .card-name{ font-size:1rem; }
  .card-meta{ font-family:'IBM Plex Mono',monospace; color:var(--ink-muted); font-size:0.78rem; margin-top:4px; }
  .card-price{ font-family:'IBM Plex Mono',monospace; white-space:nowrap; }

  /* Cartões de barbeiro — bloco inteiro colorido para identificação rápida */
  .card.barber-bruno{ background:#cfe8fb; border-color:#8fc4ec; color:#0f2d43; }
  .card.barber-bruno:hover{ border-color:#5da8dd; }
  .card.barber-bruno.selected{ background:#a9d6f5; border-color:#3d8fce; }
  .card.barber-bruno .card-meta{ color:#245275; }

  .card.barber-joao{ background:#d3f0d8; border-color:#9bd9a8; color:#0f3a1c; }
  .card.barber-joao:hover{ border-color:#69c17e; }
  .card.barber-joao.selected{ background:#b3e6bd; border-color:#3fa958; }
  .card.barber-joao .card-meta{ color:#256235; }

  .category-label{ font-family:'IBM Plex Mono',monospace; color:var(--brass); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.1em; margin:22px 0 10px; }
  .category-label:first-child{ margin-top:0; }

  input[type=date], input[type=text], input[type=tel], input[type=email]{
    width:100%; padding:12px 14px; margin-top:6px;
    background:var(--bg-alt); border:1px solid var(--brass-dim); color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif; font-size:1rem; border-radius:2px;
  }
  input:focus{ outline:2px solid var(--brass); outline-offset:1px; }
  label{ display:block; margin-bottom:16px; font-size:0.88rem; color:var(--ink-muted); }

  .slots{ display:grid; grid-template-columns:repeat(auto-fill, minmax(84px,1fr)); gap:8px; margin-top:14px; }
  .slot-btn{
    padding:10px 6px; text-align:center; font-family:'IBM Plex Mono',monospace;
    background:var(--bg-alt); border:1px solid var(--brass-dim); color:var(--ink);
    border-radius:2px; cursor:pointer; font-size:0.9rem;
  }
  .slot-btn:hover{ border-color:var(--brass); }
  .slot-btn.selected{ background:var(--primary); border-color:var(--primary); color:var(--bg); }

  .summary-row{ display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px dashed var(--brass-dim); font-size:0.94rem; }
  .summary-row:last-child{ border-bottom:none; font-weight:600; }

  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:13px 22px; border-radius:2px; font-size:0.95rem; font-weight:500; border:1px solid transparent; cursor:pointer; text-decoration:none; }
  .btn-primary{ background:var(--primary); color:var(--bg); width:100%; }
  .btn-primary:disabled{ opacity:0.4; cursor:not-allowed; }
  .btn-primary:not(:disabled):hover{ background:var(--primary-hover); }
  .btn-ghost{ background:transparent; border-color:var(--brass-dim); color:var(--ink); }
  .btn-whats{ background:#3F7A52; color:#fff; width:100%; }

  .nav-row{ display:flex; gap:10px; margin-top:26px; }
  .msg{ font-size:0.88rem; padding:12px 14px; border-radius:2px; margin-top:14px; }
  .msg.err{ background:rgba(168,64,47,0.12); color:var(--err); border:1px solid var(--err); }
  .msg.ok{ background:rgba(63,122,82,0.12); color:var(--ok); border:1px solid var(--ok); }
  .center-note{ text-align:center; color:var(--ink-muted); padding:30px 0; }
  .hidden{ display:none !important; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">&larr; The Classic House Barbearia</a>
  <h1 style="margin-top:8px;">Marcar horário</h1>

  <div style="margin:16px 0 24px;">
    <button class="btn btn-ghost btn-sm-toggle" id="my-bookings-toggle" onclick="toggleMyBookings()" style="font-size:0.85rem; padding:9px 16px;">Já tens marcação? Ver ou cancelar</button>
    <div id="my-bookings-panel" class="hidden" style="margin-top:14px; border:1px solid var(--brass-dim); background:var(--bg-alt); padding:16px 18px;">
      <label>O teu telemóvel
        <input type="tel" id="my-phone-input" placeholder="9xx xxx xxx">
      </label>
      <button class="btn btn-ghost" onclick="lookupMyBookings()">Procurar</button>
      <div id="my-bookings-results" style="margin-top:14px;"></div>
    </div>

    <button class="btn btn-ghost btn-sm-toggle" id="my-sub-toggle" onclick="toggleMySubscription()" style="font-size:0.85rem; padding:9px 16px; margin-top:8px;">És assinante? Acede à tua área</button>
    <div id="my-sub-panel" class="hidden" style="margin-top:14px; border:1px solid var(--brass-dim); background:var(--bg-alt); padding:16px 18px;">
      <label>O teu telemóvel
        <input type="tel" id="sub-phone-input" placeholder="9xx xxx xxx">
      </label>
      <label>Código de acesso
        <input type="text" id="sub-code-input" placeholder="código que recebeste da barbearia">
      </label>
      <button class="btn btn-ghost" onclick="lookupMySubscription()">Aceder</button>
      <div id="my-sub-results" style="margin-top:14px;"></div>
    </div>
  </div>

  <div class="steps">
    <div class="step-dot" data-step="1"></div>
    <div class="step-dot" data-step="2"></div>
    <div class="step-dot" data-step="3"></div>
    <div class="step-dot" data-step="4"></div>
  </div>

  <!-- STEP 1: SERVIÇO -->
  <section id="step-1">
    <span class="eyebrow">Passo 1 de 4</span>
    <h2 style="font-family:'Fraunces',serif; font-weight:600;">Escolhe o serviço</h2>
    <div id="services-list">A carregar serviços…</div>
  </section>

  <!-- STEP 2: BARBEIRO -->
  <section id="step-2" class="hidden">
    <span class="eyebrow">Passo 2 de 4</span>
    <h2 style="font-family:'Fraunces',serif; font-weight:600;">Escolhe o barbeiro</h2>
    <div id="barbers-list"></div>
    <div class="nav-row">
      <button class="btn btn-ghost" onclick="goToStep(1)">Voltar</button>
    </div>
  </section>

  <!-- STEP 3: DATA E HORA -->
  <section id="step-3" class="hidden">
    <span class="eyebrow">Passo 3 de 4</span>
    <h2 style="font-family:'Fraunces',serif; font-weight:600;">Escolhe dia e hora</h2>
    <label>Dia
      <input type="date" id="date-input">
    </label>
    <div id="slots-area"></div>
    <div class="nav-row">
      <button class="btn btn-ghost" onclick="goToStep(2)">Voltar</button>
    </div>
  </section>

  <!-- STEP 4: CONTACTO + CONFIRMAÇÃO -->
  <section id="step-4" class="hidden">
    <span class="eyebrow">Passo 4 de 4</span>
    <h2 style="font-family:'Fraunces',serif; font-weight:600;">Os teus dados</h2>
    <label>Nome
      <input type="text" id="name-input" placeholder="O teu nome">
    </label>
    <label>Telemóvel
      <input type="tel" id="phone-input" placeholder="9xx xxx xxx">
    </label>
    <label>Email (opcional)
      <input type="email" id="email-input" placeholder="email@exemplo.com">
    </label>

    <div class="category-label">Resumo</div>
    <div id="summary-area"></div>

    <div id="form-msg"></div>

    <div class="nav-row">
      <button class="btn btn-ghost" onclick="goToStep(3)">Voltar</button>
      <button class="btn btn-primary" id="confirm-btn" onclick="submitBooking()">Confirmar marcação</button>
    </div>
  </section>

  <!-- SUCESSO -->
  <section id="step-success" class="hidden">
    <div class="center-note">
      <span class="eyebrow">Marcação confirmada</span>
      <h2 style="font-family:'Fraunces',serif; font-weight:600; margin:12px 0;">Até já! 🪒</h2>
      <div id="success-summary" style="text-align:left; margin:20px 0;"></div>
      <a class="btn btn-whats" id="whats-confirm-link" target="_blank" rel="noopener">Avisar a barbearia no WhatsApp</a>
      <div style="margin-top:14px;">
        <a class="btn btn-ghost" href="index.html">Voltar ao início</a>
      </div>
    </div>
  </section>
</div>

<script>
const SUPABASE_URL = "https://kjhaphbaoxwxyankdkmk.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqaGFwaGJhb3h3eHlhbmtka21rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxOTI2ODIsImV4cCI6MjA5OTc2ODY4Mn0.IIHToQLp68HRHf7uOUblWd0YtiLRnLmsE35RVU-Cq14";
const sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

const WHATSAPP_NUMBER = "351926323222";

const state = {
  services: [], barbers: [], hours: [],
  selectedService: null,
  selectedBarber: null,
  selectedDate: null,
  selectedSlot: null,
};

function euro(v){ return v === null || v === undefined ? 'a confirmar' : `€ ${Number(v).toFixed(0)}`; }
function fmtDuration(mins){ return mins >= 60 ? `${(mins/60).toFixed(mins%60===0?0:1)} h` : `${mins} min`; }

function toggleMyBookings(){
  document.getElementById('my-bookings-panel').classList.toggle('hidden');
}

function toggleMyBookings(){
  document.getElementById('my-bookings-panel').classList.toggle('hidden');
}

function toggleMySubscription(){
  document.getElementById('my-sub-panel').classList.toggle('hidden');
}

async function lookupMySubscription(){
  const phone = document.getElementById('sub-phone-input').value.trim();
  const code = document.getElementById('sub-code-input').value.trim();
  const resultsEl = document.getElementById('my-sub-results');
  resultsEl.innerHTML = 'A procurar…';
  if (!sb || !phone || !code) { resultsEl.innerHTML = '<div class="msg err">Escreve o telemóvel e o código de acesso.</div>'; return; }

  const { data, error } = await sb.rpc('get_my_subscription', { p_phone: phone, p_access_code: code });
  if (error) { resultsEl.innerHTML = '<div class="msg err">Erro ao procurar. Tenta novamente.</div>'; console.error(error); return; }
  if (!data || data.length === 0) { resultsEl.innerHTML = '<p style="color:var(--ink-muted); font-size:0.9rem;">Não encontrei nenhuma assinatura com este telemóvel e código.</p>'; return; }

  const sub = data[0];
  const remaining = sub.total_services - sub.used_services;
  const expiryFmt = new Date(sub.end_date+'T00:00:00').toLocaleDateString('pt-PT');
  const isExpired = new Date(sub.end_date) < new Date(new Date().toDateString());

  resultsEl.innerHTML = `
    <div class="summary-row"><span>Plano</span><span>${sub.service_name ? sub.service_name.split('|')[0].trim() : ''}</span></div>
    <div class="summary-row"><span>Serviços usados</span><span>${sub.used_services} de ${sub.total_services}</span></div>
    <div class="summary-row"><span>Por usar</span><span>${remaining > 0 ? remaining : 0}</span></div>
    <div class="summary-row"><span>Validade</span><span style="color:${isExpired ? 'var(--err)' : 'var(--ok)'};">${expiryFmt}${isExpired ? ' (expirado)' : ''}</span></div>
  `;
}

async function lookupMyBookings(){
  const phone = document.getElementById('my-phone-input').value.trim();
  const resultsEl = document.getElementById('my-bookings-results');
  resultsEl.innerHTML = 'A procurar…';
  if (!sb || !phone) { resultsEl.innerHTML = '<div class="msg err">Escreve o teu telemóvel.</div>'; return; }

  const { data, error } = await sb.rpc('list_my_appointments', { p_phone: phone });
  if (error) { resultsEl.innerHTML = '<div class="msg err">Erro ao procurar. Tenta novamente.</div>'; console.error(error); return; }
  if (!data || data.length === 0) { resultsEl.innerHTML = '<p style="color:var(--ink-muted); font-size:0.9rem;">Não encontrei marcações futuras com este telemóvel.</p>'; return; }

  resultsEl.innerHTML = '';
  data.forEach(appt => {
    const dt = new Date(appt.start_time);
    const dateFmt = dt.toLocaleDateString('pt-PT', { weekday:'short', day:'numeric', month:'short' });
    const timeFmt = dt.toLocaleTimeString('pt-PT', { hour:'2-digit', minute:'2-digit' });
    const row = document.createElement('div');
    row.className = 'card';
    row.innerHTML = `
      <div class="card-row">
        <div>
          <div class="card-name">${appt.service_name ? appt.service_name.split('|')[0].trim() : ''}</div>
          <div class="card-meta">${dateFmt}, ${timeFmt} — ${appt.barber_name || ''}</div>
        </div>
      </div>
    `;
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'btn btn-ghost btn-sm';
    cancelBtn.style.marginTop = '10px';
    cancelBtn.textContent = 'Cancelar esta marcação';
    cancelBtn.addEventListener('click', async () => {
      if (!confirm('Tens a certeza que queres cancelar esta marcação?')) return;
      const { error: cancelErr } = await sb.rpc('cancel_my_appointment', { p_appointment_id: appt.id, p_phone: phone });
      if (cancelErr) { alert('Não foi possível cancelar. Contacta a barbearia pelo WhatsApp.'); console.error(cancelErr); return; }
      lookupMyBookings();
    });
    row.appendChild(cancelBtn);
    resultsEl.appendChild(row);
  });
}

async function init(){
  if (!sb) {
    document.getElementById('services-list').innerHTML =
      `<div class="msg err">Não consegui carregar a biblioteca do Supabase. Verifica a tua ligação à internet ou bloqueadores de anúncios/extensões.</div>`;
    return;
  }
  if (SUPABASE_URL.includes('COLOCA_AQUI') || SUPABASE_ANON_KEY.includes('COLOCA_AQUI')) {
    document.getElementById('services-list').innerHTML =
      `<div class="msg err">Este site ainda não está ligado à base de dados. Troca o SUPABASE_URL e a SUPABASE_ANON_KEY no início deste ficheiro.</div>`;
    return;
  }

  try {
    const [svcRes, barRes, hrsRes, catRes] = await Promise.all([
      sb.from('services').select('*').eq('active', true).order('category').order('sort_order'),
      sb.from('barbers').select('*').eq('active', true),
      sb.from('business_hours').select('*'),
      sb.from('categories').select('*').order('sort_order'),
    ]);
    if (svcRes.error) throw svcRes.error;
    if (barRes.error) throw barRes.error;
    if (hrsRes.error) throw hrsRes.error;
    state.services = svcRes.data;
    state.barbers = barRes.data;
    state.hours = hrsRes.data;
    // Se a tabela categories já existir, só mostra serviços de categorias ativas,
    // pela ordem escolhida no admin. Se ainda não existir (migration_04 por
    // correr), mostra tudo, sem filtrar.
    state.categories = (!catRes.error && catRes.data) ? catRes.data : null;
  } catch (err) {
    console.error(err);
    document.getElementById('services-list').innerHTML =
      `<div class="msg err">Não consegui ligar à base de dados. Confirma o SUPABASE_URL, a chave, e se correste o schema.sql.</div>`;
    return;
  }

  renderServices();
  renderBarbers();

  const dateInput = document.getElementById('date-input');
  const today = new Date();
  dateInput.min = today.toISOString().slice(0,10);
  const max = new Date(); max.setDate(max.getDate()+60);
  dateInput.max = max.toISOString().slice(0,10);
  dateInput.addEventListener('change', () => {
    state.selectedDate = dateInput.value;
    state.selectedSlot = null;
    renderSlots();
  });
}

function renderServices(){
  const el = document.getElementById('services-list');
  const byCategory = {};
  state.services.forEach(s => { (byCategory[s.category] ||= []).push(s); });

  let orderedCats;
  if (state.categories && state.categories.length) {
    orderedCats = state.categories.filter(c => c.active).map(c => c.name).filter(name => byCategory[name]);
  } else {
    orderedCats = Object.keys(byCategory);
  }

  el.innerHTML = '';
  orderedCats.forEach(cat => {
    const list = byCategory[cat];
    const label = document.createElement('div');
    label.className = 'category-label';
    label.textContent = cat;
    el.appendChild(label);
    list.forEach(s => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-row">
          <div>
            <div class="card-name">${s.name.split('|')[0].trim()}</div>
            <div class="card-meta">${fmtDuration(s.duration_minutes)}</div>
          </div>
          <div class="card-price">${euro(s.price_eur)}</div>
        </div>`;
      card.addEventListener('click', () => {
        state.selectedService = s;
        document.querySelectorAll('#services-list .card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        setTimeout(() => goToStep(2), 150);
      });
      el.appendChild(card);
    });
  });
}

function renderBarbers(){
  const el = document.getElementById('barbers-list');
  el.innerHTML = '';
  const anyCard = document.createElement('div');
  anyCard.className = 'card';
  anyCard.innerHTML = `<div class="card-row"><div class="card-name">Qualquer barbeiro disponível</div></div>`;
  anyCard.addEventListener('click', () => selectBarber(null, anyCard));
  el.appendChild(anyCard);

  state.barbers.forEach(b => {
    const card = document.createElement('div');
    const nameLower = (b.name || '').trim().toLowerCase();
    let colorClass = '';
    if (nameLower === 'bruno') colorClass = ' barber-bruno';
    else if (nameLower === 'joão' || nameLower === 'joao') colorClass = ' barber-joao';
    card.className = 'card' + colorClass;
    card.innerHTML = `<div class="card-row"><div class="card-name">${b.name}</div></div>`;
    card.addEventListener('click', () => selectBarber(b.id, card));
    el.appendChild(card);
  });
}

function selectBarber(barberId, cardEl){
  state.selectedBarber = barberId;
  document.querySelectorAll('#barbers-list .card').forEach(c => c.classList.remove('selected'));
  cardEl.classList.add('selected');
  setTimeout(() => goToStep(3), 150);
}

function timeStrToMinutes(t){ const [h,m] = t.split(':').map(Number); return h*60+m; }
function minutesToTimeStr(mins){ const h=Math.floor(mins/60).toString().padStart(2,'0'); const m=(mins%60).toString().padStart(2,'0'); return `${h}:${m}`; }

async function renderSlots(){
  const areaEl = document.getElementById('slots-area');
  if (!state.selectedDate || !state.selectedService) { areaEl.innerHTML = ''; return; }
  areaEl.innerHTML = '<p style="color:var(--ink-muted); font-size:0.88rem;">A verificar disponibilidade…</p>';

  const dow = new Date(state.selectedDate + 'T00:00:00').getDay();
  const hoursRow = state.hours.find(h => h.day_of_week === dow);
  if (!hoursRow || hoursRow.is_closed) {
    areaEl.innerHTML = '<div class="msg err">Fechado neste dia. Escolhe outra data.</div>';
    return;
  }

  const barberIds = state.selectedBarber ? [state.selectedBarber] : state.barbers.map(b => b.id);
  const dayStart = new Date(state.selectedDate + 'T00:00:00');
  const dayEnd = new Date(state.selectedDate + 'T23:59:59');

  const { data: busy, error } = await sb
    .from('public_busy_slots')
    .select('barber_id, start_time, end_time')
    .in('barber_id', barberIds)
    .gte('start_time', dayStart.toISOString())
    .lte('start_time', dayEnd.toISOString());

  if (error) { areaEl.innerHTML = '<div class="msg err">Erro a verificar disponibilidade.</div>'; console.error(error); return; }

  const openMin = timeStrToMinutes(hoursRow.open_time);
  const closeMin = timeStrToMinutes(hoursRow.close_time);
  const duration = state.selectedService.duration_minutes;
  const slots = [];
  const nowBuffer = new Date();

  for (let start = openMin; start + duration <= closeMin; start += 30) {
    const slotStart = new Date(state.selectedDate + 'T' + minutesToTimeStr(start) + ':00');
    const slotEnd = new Date(slotStart.getTime() + duration*60000);
    if (slotStart < nowBuffer) continue;

    for (const barberId of barberIds) {
      const conflict = (busy||[]).some(b =>
        b.barber_id === barberId &&
        new Date(b.start_time) < slotEnd &&
        new Date(b.end_time) > slotStart
      );
      if (!conflict) {
        slots.push({ time: minutesToTimeStr(start), barberId, start: slotStart, end: slotEnd });
        break;
      }
    }
  }

  if (slots.length === 0) {
    areaEl.innerHTML = '<div class="msg err">Sem horários livres neste dia. Tenta outra data.</div>';
    return;
  }

  areaEl.innerHTML = '<div class="slots" id="slots-grid"></div>';
  const grid = document.getElementById('slots-grid');
  slots.forEach(slot => {
    const btn = document.createElement('div');
    btn.className = 'slot-btn';
    btn.textContent = slot.time;
    btn.addEventListener('click', () => {
      state.selectedSlot = slot;
      document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      setTimeout(() => goToStep(4), 150);
    });
    grid.appendChild(btn);
  });
}

function goToStep(n){
  [1,2,3,4].forEach(i => document.getElementById('step-'+i).classList.toggle('hidden', i !== n));
  document.querySelectorAll('.step-dot').forEach(dot => {
    dot.classList.toggle('done', Number(dot.dataset.step) <= n);
  });
  if (n === 3) renderSlots();
  if (n === 4) renderSummary();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderSummary(){
  const s = state.selectedService, slot = state.selectedSlot;
  const barberName = slot.barberId ? (state.barbers.find(b=>b.id===slot.barberId)?.name || '') : '';
  const dateFmt = new Date(state.selectedDate+'T00:00:00').toLocaleDateString('pt-PT', { weekday:'long', day:'numeric', month:'long' });
  document.getElementById('summary-area').innerHTML = `
    <div class="summary-row"><span>Serviço</span><span>${s.name.split('|')[0].trim()}</span></div>
    <div class="summary-row"><span>Barbeiro</span><span>${barberName}</span></div>
    <div class="summary-row"><span>Quando</span><span>${dateFmt}, ${slot.time}</span></div>
    <div class="summary-row"><span>Total</span><span>${euro(s.price_eur)}</span></div>
  `;
}

async function submitBooking(){
  const name = document.getElementById('name-input').value.trim();
  const phone = document.getElementById('phone-input').value.trim();
  const email = document.getElementById('email-input').value.trim();
  const msgEl = document.getElementById('form-msg');
  msgEl.innerHTML = '';

  if (!name || !phone) {
    msgEl.innerHTML = '<div class="msg err">Preenche pelo menos o nome e o telemóvel.</div>';
    return;
  }

  const btn = document.getElementById('confirm-btn');
  btn.disabled = true; btn.textContent = 'A confirmar…';

  const slot = state.selectedSlot;

  try {
    const { error } = await sb.rpc('book_appointment', {
      p_service_id: state.selectedService.id,
      p_barber_id: slot.barberId,
      p_start_time: slot.start.toISOString(),
      p_end_time: slot.end.toISOString(),
      p_client_name: name,
      p_client_phone: phone,
      p_client_email: email || null,
      p_barber_preference: state.selectedBarber ? 'specific' : 'any',
    });
    if (error) throw error;
    showSuccess(name);
  } catch (err) {
    console.error(err);
    const raw = err.message || '';
    let friendly = 'Não foi possível confirmar. Tenta novamente ou contacta pelo WhatsApp.';
    if (raw.includes('reservado')) {
      friendly = raw;
    } else if (raw.includes('Could not find the function') || err.code === 'PGRST202') {
      friendly = 'A barbearia está a atualizar o sistema. Por favor contacta pelo WhatsApp para confirmar a marcação.';
    }
    msgEl.innerHTML = `<div class="msg err">${friendly}</div>`;
    btn.disabled = false; btn.textContent = 'Confirmar marcação';
  }
}

function showSuccess(clientName){
  [1,2,3,4].forEach(i => document.getElementById('step-'+i).classList.add('hidden'));
  document.getElementById('step-success').classList.remove('hidden');

  const s = state.selectedService, slot = state.selectedSlot;
  const barberName = slot.barberId ? (state.barbers.find(b=>b.id===slot.barberId)?.name || '') : '';
  const dateFmt = new Date(state.selectedDate+'T00:00:00').toLocaleDateString('pt-PT', { weekday:'long', day:'numeric', month:'long' });

  document.getElementById('success-summary').innerHTML = `
    <div class="summary-row"><span>Serviço</span><span>${s.name.split('|')[0].trim()}</span></div>
    <div class="summary-row"><span>Barbeiro</span><span>${barberName}</span></div>
    <div class="summary-row"><span>Quando</span><span>${dateFmt}, ${slot.time}</span></div>
  `;

  const waMsg = `Nova marcação: ${clientName} — ${s.name.split('|')[0].trim()} — ${dateFmt} às ${slot.time} — ${barberName}`;
  document.getElementById('whats-confirm-link').href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(waMsg)}`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

init();
</script>
