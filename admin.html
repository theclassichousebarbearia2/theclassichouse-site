<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão — The Classic House Barbearia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#12201A; --bg-alt:#1B2E23; --bg-card:#203726;
    --ink:#F3ECDA; --ink-muted:#B7AE95;
    --brass:#C79A45; --brass-dim:rgba(199,154,69,0.28);
    --oxblood:#8A3324; --oxblood-hover:#9E3D2C;
    --ok:#4C8B5A; --err:#B85450;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:'IBM Plex Sans',sans-serif; line-height:1.5; }
  .wrap{ max-width:920px; margin:0 auto; padding:24px 20px 80px; }
  h1{ font-family:'Fraunces',serif; font-size:1.5rem; margin:0; }
  a.back{ color:var(--ink-muted); text-decoration:none; font-size:0.85rem; }
  .eyebrow{ font-family:'IBM Plex Mono',monospace; text-transform:uppercase; letter-spacing:0.14em; font-size:0.68rem; color:var(--brass); }
  .top-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }

  input, select{
    padding:11px 13px; background:var(--bg-alt); border:1px solid var(--brass-dim); color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif; font-size:0.95rem; border-radius:2px;
  }
  input:focus, select:focus{ outline:2px solid var(--brass); outline-offset:1px; }
  label{ display:block; margin-bottom:14px; font-size:0.85rem; color:var(--ink-muted); }
  label input, label select{ width:100%; margin-top:5px; }

  .btn{ display:inline-flex; align-items:center; gap:8px; padding:11px 18px; border-radius:2px; font-size:0.9rem; font-weight:500; border:1px solid transparent; cursor:pointer; text-decoration:none; }
  .btn-primary{ background:var(--oxblood); color:var(--ink); }
  .btn-primary:hover{ background:var(--oxblood-hover); }
  .btn-primary:disabled{ opacity:0.4; cursor:not-allowed; }
  .btn-ghost{ background:transparent; border-color:var(--brass-dim); color:var(--ink); }
  .btn-ghost:hover{ border-color:var(--brass); }
  .btn-sm{ padding:6px 12px; font-size:0.8rem; }

  .login-card{ max-width:360px; margin:80px auto; border:1px solid var(--brass-dim); background:var(--bg-alt); padding:30px; }
  .login-card h2{ font-family:'Fraunces',serif; margin:0 0 18px; }

  .tabs{ display:flex; gap:8px; margin-bottom:22px; border-bottom:1px solid var(--brass-dim); }
  .tab-btn{ background:none; border:none; color:var(--ink-muted); font-family:'IBM Plex Mono',monospace; font-size:0.82rem; text-transform:uppercase; letter-spacing:0.08em; padding:10px 4px; cursor:pointer; border-bottom:2px solid transparent; margin-right:18px; }
  .tab-btn.active{ color:var(--ink); border-bottom-color:var(--brass); }

  .appt-row{ display:flex; justify-content:space-between; align-items:center; gap:14px; padding:14px 0; border-bottom:1px dashed var(--brass-dim); }
  .appt-row.cancelled{ opacity:0.4; }
  .appt-time{ font-family:'IBM Plex Mono',monospace; font-size:1.05rem; min-width:52px; }
  .appt-info{ flex:1; }
  .appt-client{ font-weight:500; }
  .appt-meta{ color:var(--ink-muted); font-size:0.82rem; margin-top:2px; }
  .appt-price{ font-family:'IBM Plex Mono',monospace; }
  .appt-actions{ display:flex; gap:6px; flex-wrap:wrap; }

  .badge-paid{ background:rgba(76,139,90,0.18); color:#9FCBA8; border:1px solid var(--ok); border-radius:2px; padding:5px 10px; font-size:0.78rem; }

  .range-buttons{ display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
  .stat-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:26px; }
  .stat-card{ border:1px solid var(--brass-dim); background:var(--bg-alt); padding:18px; }
  .stat-card .eyebrow{ display:block; margin-bottom:8px; }
  .stat-card .value{ font-family:'IBM Plex Mono',monospace; font-size:1.6rem; }

  .client-row{ display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px dashed var(--brass-dim); }
  .client-name{ font-weight:500; }
  .client-meta{ color:var(--ink-muted); font-size:0.82rem; margin-top:2px; }

  .msg{ font-size:0.85rem; padding:10px 12px; border-radius:2px; margin:10px 0; }
  .msg.err{ background:rgba(184,84,80,0.15); color:#E8A6A2; border:1px solid var(--err); }
  .msg.ok{ background:rgba(76,139,90,0.15); color:#9FCBA8; border:1px solid var(--ok); }
  .hidden{ display:none !important; }
  .manual-form{ border:1px solid var(--brass-dim); background:var(--bg-alt); padding:18px; margin-bottom:20px; }
  .form-grid{ display:grid; gap:12px; grid-template-columns:1fr 1fr; }
  @media (max-width:600px){ .form-grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-row">
    <div>
      <a class="back" href="index.html">&larr; The Classic House Barbearia</a>
      <h1 style="margin-top:6px;">Gestão</h1>
    </div>
    <button class="btn btn-ghost hidden" id="logout-btn" onclick="logout()">Sair</button>
  </div>

  <!-- LOGIN -->
  <div class="login-card" id="login-view">
    <h2>Entrar</h2>
    <label>Email
      <input type="email" id="login-email">
    </label>
    <label>Palavra-passe
      <input type="password" id="login-password">
    </label>
    <div id="login-msg"></div>
    <button class="btn btn-primary" style="width:100%;" onclick="login()">Entrar</button>
    <p style="color:var(--ink-muted); font-size:0.78rem; margin-top:16px;">
      A tua conta cria-se no dashboard do Supabase, em Authentication → Users → Add user.
    </p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard-view" class="hidden">
    <div class="tabs">
      <button class="tab-btn active" data-tab="agenda" onclick="switchTab('agenda')">Agenda</button>
      <button class="tab-btn" data-tab="relatorios" onclick="switchTab('relatorios')">Relatórios</button>
      <button class="tab-btn" data-tab="clientes" onclick="switchTab('clientes')">Clientes</button>
    </div>

    <!-- AGENDA -->
    <section id="tab-agenda">
      <label style="max-width:220px;">Dia
        <input type="date" id="agenda-date">
      </label>
      <button class="btn btn-ghost btn-sm" id="toggle-manual-btn" onclick="toggleManualForm()" style="margin-bottom:16px;">+ Nova marcação manual</button>

      <div class="manual-form hidden" id="manual-form">
        <div class="form-grid">
          <label>Serviço
            <select id="manual-service"></select>
          </label>
          <label>Barbeiro
            <select id="manual-barber"></select>
          </label>
          <label>Data e hora
            <input type="datetime-local" id="manual-datetime">
          </label>
          <label>Nome do cliente
            <input type="text" id="manual-name">
          </label>
          <label>Telemóvel
            <input type="tel" id="manual-phone">
          </label>
        </div>
        <div id="manual-msg"></div>
        <button class="btn btn-primary" onclick="submitManualAppointment()">Adicionar</button>
      </div>

      <div id="agenda-list">A carregar…</div>
    </section>

    <!-- RELATORIOS -->
    <section id="tab-relatorios" class="hidden">
      <div class="range-buttons">
        <button class="btn btn-ghost btn-sm" onclick="loadReport('hoje')">Hoje</button>
        <button class="btn btn-ghost btn-sm" onclick="loadReport('semana')">Esta semana</button>
        <button class="btn btn-ghost btn-sm" onclick="loadReport('mes')">Este mês</button>
      </div>
      <div id="report-area">Escolhe um período acima.</div>
    </section>

    <!-- CLIENTES -->
    <section id="tab-clientes" class="hidden">
      <div id="clients-list">A carregar…</div>
    </section>
  </div>
</div>

<script>
// ============================================================
// LIGAÇÃO AO SUPABASE — troca pelos valores do teu projeto
// ============================================================
const SUPABASE_URL = "https://kjhaphbaoxwxyankdkmk.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqaGFwaGJhb3h3eHlhbmtka21rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxOTI2ODIsImV4cCI6MjA5OTc2ODY4Mn0.IIHToQLp68HRHf7uOUblWd0YtiLRnLmsE35RVU-Cq14";
const sb = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

let services = [], barbers = [];

async function login(){
  const msgEl = document.getElementById('login-msg');
  msgEl.innerHTML = '';
  if (!sb) {
    msgEl.innerHTML = `<div class="msg err">Não consegui carregar a biblioteca do Supabase (o ficheiro vindo da internet). Verifica a tua ligação à internet ou bloqueadores de anúncios/extensões.</div>`;
    return;
  }
  if (SUPABASE_URL.includes('COLOCA_AQUI') || SUPABASE_ANON_KEY.includes('COLOCA_AQUI')) {
    msgEl.innerHTML = `<div class="msg err">Este painel ainda não está ligado ao Supabase. Troca o SUPABASE_URL e a SUPABASE_ANON_KEY no início do ficheiro admin.html.</div>`;
    return;
  }
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { msgEl.innerHTML = `<div class="msg err">Email ou palavra-passe incorretos.</div>`; return; }
  showDashboard();
}

async function logout(){
  await sb.auth.signOut();
  document.getElementById('login-view').classList.remove('hidden');
  document.getElementById('dashboard-view').classList.add('hidden');
  document.getElementById('logout-btn').classList.add('hidden');
}

async function showDashboard(){
  document.getElementById('login-view').classList.add('hidden');
  document.getElementById('dashboard-view').classList.remove('hidden');
  document.getElementById('logout-btn').classList.remove('hidden');

  try {
    const [svcRes, barRes] = await Promise.all([
      sb.from('services').select('*').order('category').order('sort_order'),
      sb.from('barbers').select('*'),
    ]);
    if (svcRes.error) throw svcRes.error;
    if (barRes.error) throw barRes.error;
    services = svcRes.data || [];
    barbers = barRes.data || [];
  } catch (err) {
    console.error(err);
    document.getElementById('agenda-list').innerHTML =
      `<div class="msg err">Não consegui carregar os dados do Supabase. Confirma o SUPABASE_URL e a chave no início deste ficheiro.</div>`;
    return;
  }

  const dateInput = document.getElementById('agenda-date');
  dateInput.value = new Date().toISOString().slice(0,10);
  dateInput.addEventListener('change', () => loadAgenda(dateInput.value));
  loadAgenda(dateInput.value);

  const svcSelect = document.getElementById('manual-service');
  svcSelect.innerHTML = services.map(s => `<option value="${s.id}">${s.name.split('|')[0].trim()} (${euro(s.price_eur)})</option>`).join('');
  const barberSelect = document.getElementById('manual-barber');
  barberSelect.innerHTML = barbers.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
}

function euro(v){ return v === null || v === undefined ? 'a confirmar' : `€ ${Number(v).toFixed(0)}`; }

function switchTab(tab){
  ['agenda','relatorios','clientes'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t !== tab);
    document.querySelector(`.tab-btn[data-tab="${t}"]`).classList.toggle('active', t === tab);
  });
  if (tab === 'clientes') loadClients();
}

function toggleManualForm(){
  document.getElementById('manual-form').classList.toggle('hidden');
}

async function loadAgenda(dateStr){
  const listEl = document.getElementById('agenda-list');
  listEl.innerHTML = 'A carregar…';
  const dayStart = new Date(dateStr+'T00:00:00');
  const dayEnd = new Date(dateStr+'T23:59:59');

  const { data, error } = await sb
    .from('appointments')
    .select('*, clients(name,phone), barbers(name), services(name,price_eur), payments(id,amount_eur)')
    .gte('start_time', dayStart.toISOString())
    .lte('start_time', dayEnd.toISOString())
    .order('start_time');

  if (error) { listEl.innerHTML = `<div class="msg err">Erro a carregar a agenda.</div>`; console.error(error); return; }
  if (!data || data.length === 0) { listEl.innerHTML = `<p style="color:var(--ink-muted);">Sem marcações neste dia.</p>`; return; }

  listEl.innerHTML = '';
  data.forEach(appt => {
    const time = new Date(appt.start_time).toLocaleTimeString('pt-PT', { hour:'2-digit', minute:'2-digit' });
    const isPaid = appt.payments && appt.payments.length > 0;
    const price = appt.services?.price_eur;
    const row = document.createElement('div');
    row.className = 'appt-row' + (appt.status === 'cancelled' ? ' cancelled' : '');
    row.innerHTML = `
      <div class="appt-time">${time}</div>
      <div class="appt-info">
        <div class="appt-client">${appt.clients?.name || 'Cliente'} · ${appt.clients?.phone || ''}</div>
        <div class="appt-meta">${appt.services?.name?.split('|')[0].trim() || ''} — ${appt.barbers?.name || ''}${appt.status==='cancelled' ? ' — cancelada' : ''}</div>
      </div>
      <div class="appt-price">${euro(price)}</div>
      <div class="appt-actions"></div>
    `;
    const actions = row.querySelector('.appt-actions');
    if (appt.status !== 'cancelled') {
      if (isPaid) {
        const badge = document.createElement('span');
        badge.className = 'badge-paid';
        badge.textContent = 'Pago ✓';
        badge.style.cursor = 'pointer';
        badge.title = 'Clicar para desfazer';
        badge.addEventListener('click', () => unmarkPaid(appt.payments[0].id, dateStr));
        actions.appendChild(badge);
      } else {
        const payBtn = document.createElement('button');
        payBtn.className = 'btn btn-ghost btn-sm';
        payBtn.textContent = 'Marcar como pago';
        payBtn.addEventListener('click', () => markPaid(appt.id, price, dateStr));
        actions.appendChild(payBtn);
      }
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'btn btn-ghost btn-sm';
      cancelBtn.textContent = 'Cancelar';
      cancelBtn.addEventListener('click', () => cancelAppointment(appt.id, dateStr));
      actions.appendChild(cancelBtn);
    }
    listEl.appendChild(row);
  });
}

async function markPaid(appointmentId, price, dateStr){
  const { error } = await sb.from('payments').insert({
    appointment_id: appointmentId,
    amount_eur: price || 0,
    method: 'dinheiro',
  });
  if (error) { console.error(error); alert('Erro ao marcar como pago.'); return; }
  loadAgenda(dateStr);
}

async function unmarkPaid(paymentId, dateStr){
  const { error } = await sb.from('payments').delete().eq('id', paymentId);
  if (error) { console.error(error); alert('Erro ao desfazer o pagamento.'); return; }
  loadAgenda(dateStr);
}

async function cancelAppointment(appointmentId, dateStr){
  if (!confirm('Cancelar esta marcação?')) return;
  const { error } = await sb.from('appointments').update({ status: 'cancelled' }).eq('id', appointmentId);
  if (error) { console.error(error); alert('Erro ao cancelar.'); return; }
  loadAgenda(dateStr);
}

async function submitManualAppointment(){
  const serviceId = document.getElementById('manual-service').value;
  const barberId = document.getElementById('manual-barber').value;
  const datetime = document.getElementById('manual-datetime').value;
  const name = document.getElementById('manual-name').value.trim();
  const phone = document.getElementById('manual-phone').value.trim();
  const msgEl = document.getElementById('manual-msg');
  msgEl.innerHTML = '';

  if (!datetime || !name || !phone) {
    msgEl.innerHTML = '<div class="msg err">Preenche data/hora, nome e telemóvel.</div>';
    return;
  }
  const service = services.find(s => s.id === serviceId);
  const startTime = new Date(datetime);
  const endTime = new Date(startTime.getTime() + service.duration_minutes*60000);

  const { data: conflicts } = await sb
    .from('appointments')
    .select('id')
    .eq('barber_id', barberId)
    .neq('status', 'cancelled')
    .lt('start_time', endTime.toISOString())
    .gt('end_time', startTime.toISOString());

  if (conflicts && conflicts.length > 0) {
    if (!confirm('Já existe uma marcação para este barbeiro nesse horário. Adicionar na mesma?')) return;
  }

  try {
    const { data: existing } = await sb.from('clients').select('id').eq('phone', phone).maybeSingle();
    let clientId = existing?.id;
    if (!clientId) {
      const { data: created, error } = await sb.from('clients').insert({ name, phone }).select('id').single();
      if (error) throw error;
      clientId = created.id;
    }
    const { error: apptErr } = await sb.from('appointments').insert({
      client_id: clientId, barber_id: barberId, service_id: serviceId,
      start_time: startTime.toISOString(), end_time: endTime.toISOString(), status: 'confirmed',
    });
    if (apptErr) throw apptErr;

    document.getElementById('manual-name').value = '';
    document.getElementById('manual-phone').value = '';
    document.getElementById('manual-datetime').value = '';
    toggleManualForm();
    loadAgenda(document.getElementById('agenda-date').value);
  } catch (err) {
    console.error(err);
    msgEl.innerHTML = '<div class="msg err">Erro ao adicionar a marcação.</div>';
  }
}

function rangeDates(kind){
  const now = new Date();
  if (kind === 'hoje') {
    const start = new Date(now); start.setHours(0,0,0,0);
    const end = new Date(start); end.setDate(end.getDate()+1);
    return [start, end, 'Hoje'];
  }
  if (kind === 'semana') {
    const start = new Date(now); start.setHours(0,0,0,0);
    const dow = (start.getDay() + 6) % 7; // 0 = Monday
    start.setDate(start.getDate() - dow);
    const end = new Date(start); end.setDate(end.getDate()+7);
    return [start, end, 'Esta semana'];
  }
  const start = new Date(now.getFullYear(), now.getMonth(), 1);
  const end = new Date(now.getFullYear(), now.getMonth()+1, 1);
  return [start, end, 'Este mês'];
}

async function loadReport(kind){
  const [start, end, label] = rangeDates(kind);
  const areaEl = document.getElementById('report-area');
  areaEl.innerHTML = 'A calcular…';

  const { data, error } = await sb
    .from('payments')
    .select('amount_eur, paid_at, appointments(barber_id, barbers(name))')
    .gte('paid_at', start.toISOString())
    .lt('paid_at', end.toISOString());

  if (error) { areaEl.innerHTML = `<div class="msg err">Erro a calcular o relatório.</div>`; console.error(error); return; }

  const total = (data||[]).reduce((sum, p) => sum + Number(p.amount_eur), 0);
  const count = (data||[]).length;
  const byBarber = {};
  (data||[]).forEach(p => {
    const name = p.appointments?.barbers?.name || 'Sem barbeiro';
    byBarber[name] = (byBarber[name] || 0) + Number(p.amount_eur);
  });

  areaEl.innerHTML = `
    <div class="eyebrow" style="margin-bottom:14px; display:block;">${label}</div>
    <div class="stat-grid">
      <div class="stat-card"><span class="eyebrow">Faturação</span><div class="value">€ ${total.toFixed(0)}</div></div>
      <div class="stat-card"><span class="eyebrow">Marcações pagas</span><div class="value">${count}</div></div>
    </div>
    <div class="eyebrow" style="margin-bottom:10px; display:block;">Por barbeiro</div>
    ${Object.entries(byBarber).map(([name, val]) => `
      <div class="summary-row" style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed var(--brass-dim);">
        <span>${name}</span><span class="mono">€ ${val.toFixed(0)}</span>
      </div>
    `).join('') || '<p style="color:var(--ink-muted);">Sem pagamentos neste período.</p>'}
  `;
}

async function loadClients(){
  const listEl = document.getElementById('clients-list');
  listEl.innerHTML = 'A carregar…';
  const { data: clients, error } = await sb.from('clients').select('*').order('name');
  if (error) { listEl.innerHTML = `<div class="msg err">Erro a carregar clientes.</div>`; console.error(error); return; }

  const { data: appts } = await sb.from('appointments').select('client_id').neq('status','cancelled');
  const visitCounts = {};
  (appts||[]).forEach(a => { visitCounts[a.client_id] = (visitCounts[a.client_id]||0) + 1; });

  if (!clients || clients.length === 0) { listEl.innerHTML = '<p style="color:var(--ink-muted);">Ainda não há clientes registados.</p>'; return; }

  listEl.innerHTML = clients.map(c => `
    <div class="client-row">
      <div>
        <div class="client-name">${c.name}</div>
        <div class="client-meta">${c.phone}${c.email ? ' · ' + c.email : ''}</div>
      </div>
      <div class="client-meta">${visitCounts[c.id] || 0} marcações</div>
    </div>
  `).join('');
}

// mantém a sessão se já estiver autenticado
if (sb) {
  sb.auth.getSession().then(({ data }) => {
    if (data.session) showDashboard();
  });
}
</script>
</body>
</html>
